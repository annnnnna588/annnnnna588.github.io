<html>
  <head>
    <!-- Include A-Frame library -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    
    <!-- Include custom lightmaps component -->
    <script src="komponentes/lightmaps.js"></script>
    
    <!-- Include A-Frame extras library -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
  </head> 
  <body>  
    <a-scene> 
      <!-- NAVMESH entity for navigation -->
      <a-entity gltf-model="obj\navmesh.glb" nav-mesh="" position="0 0.35 -0.14" rotation="0 90 0" visible="false">
      </a-entity>

      <!-- Main scene object -->
    <a-entity id="telpa" gltf-model="obj\makslas_telpa_prieks_aframe_06.glb" rotation="0 90 0" position="0 0.35 0">
      </a-entity>
    

      <a-entity id="zari" gltf-model="obj\zari.glb" position="0 0.35 0" rotation="0 90 0"></a-entity>
      <a-plane src="img/skice_putni.jpg" position="9.29059 3.32226 -11.77132" scale="4.62357 4.62357 4.62357" rotation="90.00021045914971 90 0" id="skice_putni"></a-plane>      <a-sky color="#ECECEC"></a-sky>
    
      
              
      <a-entity light="color: #ffffff; decay: 2; distance: 30; intensity: 3.78; type: point; castShadow: true" position="8.57803 1.57835 -10.37316" scale="0.1 0.1 0.1"></a-entity>
      <a-entity light="color: #ffffff; decay: 2; distance: 30; intensity: 3.78; type: point; castShadow: true" position="8.57803 1.57835 -10.37316" scale="0.1 0.1 0.1"></a-entity>
      <a-entity light="color: #ffffff; decay: 2; distance: 30; intensity: 3.78; type: point; castShadow: true" position="10.93205 1.57835 -5.00389" scale="0.1 0.1 0.1"></a-entity>
      <a-entity light="color: #ffffff; decay: 2; distance: 30; intensity: 3.78; type: point; castShadow: true" position="1.01146 1.57835 -5.00389" scale="0.1 0.1 0.1"></a-entity>
      <a-entity light="color: #ffffff; decay: 2; distance: 30; intensity: 3.78; type: point; castShadow: true" position="1.01146 1.57835 2.43528" scale="0.1 0.1 0.1"></a-entity>




      <!-- User rig with movement controls -->
      <a-entity 
        id="rig"
        movement-controls="speed: 0.15; constrainToNavMesh: true"
        position="1 1 1">
        <a-entity camera look-controls></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
